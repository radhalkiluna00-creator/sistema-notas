<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Instinct Edu</title>

<style>
body {
    margin: 0;
    background: #1a1a1b;
    color: white;
    font-family: sans-serif;
    overflow-x: hidden;
}

.dashboard {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 250px;
    background: #121212;
    padding: 20px;
}

.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

.card {
    background: #242424;
    padding: 20px;
    border-radius: 10px;
}

input {
    padding: 10px;
    margin-bottom: 10px;
    width: 100%;
    background: #1a1a1b;
    border: 1px solid #444;
    color: white;
}

button {
    padding: 10px;
    background: #ff4757;
    border: none;
    color: white;
    cursor: pointer;
}

.aprobado { color: #4cd137; }
.reprobado { color: red; }

table {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="dashboard">

<div class="sidebar">
    <h3>Instinct Edu</h3>
    <p id="nombreUser"></p>
    <p id="rolTag"></p>

    <button onclick="cerrarSesion()">Cerrar sesión</button>

    <div id="seccionMaestro" style="display:none;">
        <input id="materiaNombre" disabled>
        <input type="number" id="materiaNota" placeholder="Nota 0-100">
        <button onclick="guardarNuevaNota()">Guardar</button>
    </div>
</div>

<div class="main">
    <h1>Notas</h1>

    <input id="inputBusqueda" placeholder="Buscar materia">

    <div class="card">
        <table>
            <tbody id="tabla-cuerpo"></tbody>
        </table>
    </div>
</div>

</div>

<script>
const usuario = JSON.parse(localStorage.getItem('usuarioRegistrado'));

if (!usuario) {
    window.location.href = "registro.html";
}

document.getElementById('nombreUser').innerText = usuario.nombre;
document.getElementById('rolTag').innerText = usuario.rol;

if (usuario.rol === "maestro") {
    document.getElementById('seccionMaestro').style.display = "block";
    document.getElementById('materiaNombre').value = usuario.asignatura;
}

function guardarNuevaNota() {
    const nota = parseInt(document.getElementById('materiaNota').value);

    if (isNaN(nota) || nota < 0 || nota > 100) {
        alert("Nota inválida");
        return;
    }

    let notas = JSON.parse(localStorage.getItem('notasSistema')) || [];

    notas.push({
        materia: usuario.asignatura,
        nota: nota,
        maestro: usuario.nombre
    });

    localStorage.setItem('notasSistema', JSON.stringify(notas));

    dibujarTabla();
}

function dibujarTabla(filtro = "") {
    const tabla = document.getElementById('tabla-cuerpo');
    const notas = JSON.parse(localStorage.getItem('notasSistema')) || [];

    let html = "";

    notas.filter(n => n.materia.toLowerCase().includes(filtro))
    .forEach(n => {
        const estado = n.nota >= 70 ? "Aprobado" : "Reprobado";
        const clase = n.nota >= 70 ? "aprobado" : "reprobado";

        html += `
        <tr>
            <td>${n.materia}</td>
            <td>${n.nota}</td>
            <td class="${clase}">${estado}</td>
            <td>${n.maestro}</td>
        </tr>`;
    });

    tabla.innerHTML = html || "<tr><td>No hay datos</td></tr>";
}

document.getElementById('inputBusqueda').addEventListener('input', e => {
    dibujarTabla(e.target.value.toLowerCase());
});

dibujarTabla();

function cerrarSesion() {
    localStorage.removeItem('usuarioRegistrado');
    window.location.href = "registro.html";
}
</script>

</body>
</html>
